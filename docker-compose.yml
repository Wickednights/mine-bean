services:
  mongodb:
    image: mongo:7
    container_name: mine-bean-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mine-bean-backend
    ports:
      - "3001:3001"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/minebean
      RPC_URL: ${RPC_URL:-https://bnb-testnet-dataseed.bnbchain.org}
      GRIDMINING_ADDRESS: 0x597Af29D204EE1d019Df89f1E93Cf013b098BEf4
      BEAN_ADDRESS: 0xC9ccBa0104a105EcB35B962BD1302cfCF4AE6BEF
      AUTOMINER_ADDRESS: 0xCdB629B6E58BBae482adfE49B9886a6a1BBD7304
      TREASURY_ADDRESS: 0xD02139f8ce44AA168822a706BDa3dde6a2305728
      STAKING_ADDRESS: 0x64C90Fdb24F275861067BF332A0C7661cb938F99
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mine-bean-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Supabase (optional - set in .env or .env.local)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend

volumes:
  mongodb_data:
